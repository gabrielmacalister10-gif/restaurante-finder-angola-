<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restaurantes Próximos</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css"/>
<style>
body { margin:0; font-family:Arial,sans-serif; background:#f5f5f5; }
header { background:#ff5722; color:white; text-align:center; padding:20px; }
main { padding:15px; }
button { background:#007bff; color:white; border:none; padding:12px 20px; border-radius:8px; cursor:pointer; font-size:16px; }
button:hover { background:#0056b3; }
#status { margin:15px 0; }
#map { width:100%; height:500px; border-radius:10px; }
</style>
</head>
<body>
<header>
  <h1>🍴 Restaurantes Próximos</h1>
  <p>Encontre restaurantes perto de você</p>
</header>
<main>
  <button onclick="findUserLocation()">Encontrar Restaurantes</button>
  <p id="status">Clique no botão para começar.</p>
  <div id="map"></div>
</main>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBiBrcHXcZcm15lXS6O5GNmimgdPQjwu8U",
    authDomain: "restaurantfinderangola.firebaseapp.com",
    projectId: "restaurantfinderangola",
    storageBucket: "restaurantfinderangola.firebasestorage.app",
    messagingSenderId: "84259871059",
    appId: "1:84259871059:web:6493fa4ef10f0fd009a9a6",
    measurementId: "G-785WV1XVQ3"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let map;
  let userMarker;
  let restaurantLayer = L.layerGroup();

  function initMap() {
    map = L.map('map').setView([-8.8383, 13.2344], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap'
    }).addTo(map);
    restaurantLayer.addTo(map);
    L.Control.geocoder({ defaultMarkGeocode: true }).addTo(map);
  }

  window.findUserLocation = function () {
    const status = document.getElementById("status");
    status.textContent = "Procurando localização...";

    if (!navigator.geolocation) {
      status.textContent = "Geolocalização não suportada.";
      return;
    }

    navigator.geolocation.getCurrentPosition(
      (position) => {
        const lat = position.coords.latitude;
        const lon = position.coords.longitude;
        status.textContent = "Localização encontrada! A carregar restaurantes...";
        map.setView([lat, lon], 15);

        if (userMarker) {
          userMarker.setLatLng([lat, lon]);
        } else {
          userMarker = L.marker([lat, lon], {
            icon: L.icon({
              iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-blue.png',
              shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
              iconSize: [25, 41], iconAnchor: [12, 41],
              popupAnchor: [1, -34], shadowSize: [41, 41]
            })
          }).addTo(map).bindPopup("Você está aqui!").openPopup();
        }

        loadRestaurantsFromFirestore(status);
      },
      (error) => {
        status.textContent = "Erro: " + error.message;
      }
    );
  };

  async function loadRestaurantsFromFirestore(status) {
    restaurantLayer.clearLayers();
    try {
      const querySnapshot = await getDocs(collection(db, "restaurantes"));
      if (querySnapshot.empty) {
        status.textContent = "Nenhum restaurante encontrado.";
        return;
      }
      querySnapshot.forEach((doc) => {
        const r = doc.data();
        if (r.lat && r.lon) {
          const marker = L.marker([
            parseFloat(r.lat),
            parseFloat(r.lon)
          ]);
          marker.bindPopup(`
            <b>${r.nome}</b><br>
            🍽️ ${r.categoria}<br>
            📍 ${r.localização}<br>
            📞 ${r.telefone || "N/A"}<br>
            ⭐ ${r.avaliacao || "Sem avaliação"}
          `);
          restaurantLayer.addLayer(marker);
        }
      });
      status.textContent = "✅ " + querySnapshot.size + " restaurante(s) carregado(s)!";
    } catch (error) {
      status.textContent = "Erro: " + error.message;
      console.error(error);
    }
  }

  initMap();
</script>
</body>
</html>
